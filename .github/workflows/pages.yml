name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build site
        run: |
          mkdir -p _site/apps/musictheory
          cp -r apps/musictheory/* _site/apps/musictheory/
          mkdir -p _site/apps/tracker
          cp -r apps/tracker/* _site/apps/tracker/
          cat > _site/index.html <<'HTML'
          <!DOCTYPE html>
          <html lang="sv">
          <head>
            <meta charset="UTF-8">
            <title>Agency</title>
          </head>
          <body>
            <h1>Agency Apps</h1>
            <ul>
              <li><a href="apps/musictheory/">MusicTheory Pro</a></li>
              <li><a href="apps/tracker/">Track3r</a></li>
            </ul>
          </body>
          </html>
          HTML

      - name: Deploy to gh-pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: _site
          branch: gh-pages
          clean: true
